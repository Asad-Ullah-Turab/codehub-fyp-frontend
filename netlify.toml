[[redirects]]
  # Handle client-side routing - redirect all requests to index.html
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  # Apply security headers to all pages
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Cache control for static assets
    Cache-Control = "public, max-age=31536000"

[[headers]]
  # Different cache control for HTML files
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  # Cache control for API calls (don't cache)
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[context.production.environment]
  # Production environment variables (can be overridden in Netlify UI)
  VITE_API_URL = "https://codehub-backend.eastasia.cloudapp.azure.com/api"